version: "3.8"

services:
  backend:
    build: ./python-backend
    ports:
      - "8000:8000"
    env_file: ./python-backend/.env
    volumes:
      - ./python-backend:/app
    environment:
      - PYTHONUNBUFFERED=1

  frontend:
    build: .
    ports:
      - "3000:80"
    depends_on:
      - backend
